<!DOCTYPE html>
<html>
<head>
  <title>PunjabiGuard</title>

  <!-- Clerk -->
  <script async crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_YXBwYXJlbnQtY2l2ZXQtMjMuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
  </script>

  <style>
    body { background:#0a0a12; color:white; font-family:sans-serif; }
    #app { display:none; }
  </style>
</head>

<body>

<div id="auth"></div>

<div id="app">
  <h2>PunjabiGuard AI</h2>
  <input id="input" placeholder="Enter text">
  <button onclick="send()">Check</button>
  <p id="result"></p>
</div>

<script>
const API = "https://devxaman-punjabi-hate-detector.hf.space";

function waitClerk() {
  return new Promise(resolve => {
    if (window.Clerk) return resolve(window.Clerk);
    let t = setInterval(() => {
      if (window.Clerk) {
        clearInterval(t);
        resolve(window.Clerk);
      }
    }, 50);
  });
}

async function init() {
  const Clerk = await waitClerk();
  await Clerk.load();

  if (Clerk.user) {
    showApp();
  } else {
    Clerk.mountSignIn(document.getElementById("auth"));
  }

  Clerk.addListener(() => {
    if (Clerk.user) showApp();
  });
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
}

async function send() {
  const text = document.getElementById("input").value;

  const res = await fetch(API + "/predict", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({text})
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    data.is_hate ? "HATE" : "SAFE";
}

init();
</script>

</body>
</html>
