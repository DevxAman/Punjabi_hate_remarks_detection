<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PunjabiGuard AI</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.css">
<script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+Gurmukhi&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0a12;
  --card:#12121a;
  --text:#fff;
  --accent:#7c6bff;
}

.light {
  --bg:#f5f5f5;
  --card:#fff;
  --text:#111;
}

body {
  margin:0;
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:var(--card);
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo {
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
}

.toggle {
  margin-top:auto;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* CHAT */
.chat {
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg {
  max-width:70%;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.user { background:#2c2c45; margin-left:auto; }
.bot { background:#1a1a2b; }

/* INPUT */
.input {
  display:flex;
  padding:10px;
  border-top:1px solid #222;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a2a;
  color:white;
}

button {
  margin-left:10px;
  padding:12px 20px;
  background:var(--accent);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* AUTH */
#auth {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
</style>
</head>

<body>

<div id="auth"></div>

<div id="app" style="display:none;">
  
  <div class="sidebar">
    <div class="logo">🤖 PunjabiGuard AI</div>

    <div id="user"></div>

    <div class="toggle" onclick="toggleTheme()">🌙 Toggle Theme</div>
  </div>

  <div class="main">

    <div class="chat" id="chat"></div>

    <div class="input">
      <input id="input" placeholder="Type Punjabi text...">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>
const CLERK_PUBLISHABLE_KEY = "pk_test_YXBwYXJlbnQtY2l2ZXQtMjMuY2xlcmsuYWNjb3VudHMuZGV2JA";
const API = "https://devxaman-punjabi-hate-detector.hf.space";

/* INIT CLERK */
window.Clerk.load({
  publishableKey: CLERK_PUBLISHABLE_KEY
}).then(() => {

  if (!Clerk.user) {
    Clerk.mountSignIn(document.getElementById("auth"));
  } else {
    startApp();
  }

  Clerk.addListener(() => {
    if (Clerk.user) startApp();
  });

});

/* START APP */
function startApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "flex";

  document.getElementById("user").innerHTML =
    `<p>👤 ${Clerk.user.firstName || "User"}</p>
     <button onclick="Clerk.signOut()">Logout</button>`;
}

/* SEND MESSAGE */
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMsg(text,"user");
  input.value="";

  const typing = addMsg("Analyzing...","bot");

  try {
    const res = await fetch(API+"/predict",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text})
    });

    const data = await res.json();

    typing.innerText = data.is_hate
      ? "🚨 Hate detected"
      : "✅ Safe text";

  } catch {
    typing.innerText = "Server error";
  }
}

/* ADD MESSAGE */
function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
