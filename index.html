<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PunjabiGuard AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&family=Noto+Sans+Gurmukhi&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a12;
  --card: #12121a;
  --accent: #7c6bff;
  --accent2: #ff6b8a;
  --text: #f2f2ff;
  --muted: #9aa0b5;
  --safe: #00e5a0;
  --hate: #ff4d70;
}

/* BASE */
body {
  margin:0;
  font-family: 'Outfit', sans-serif;
  background: radial-gradient(circle at 20% 20%, rgba(124,107,255,0.1), transparent),
              radial-gradient(circle at 80% 80%, rgba(255,107,138,0.08), transparent),
              var(--bg);
  color: var(--text);
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 3rem;
  font-weight: 900;
  background: linear-gradient(120deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CARD */
.card {
  margin-top: 40px;
  padding: 25px;
  border-radius: 18px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 120px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 15px;
  background: #0f0f18;
  color: white;
  font-size: 1rem;
  font-family: 'Noto Sans Gurmukhi', sans-serif;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

/* BUTTON */
button {
  margin-top: 20px;
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(120deg, var(--accent), #9a8bff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(124,107,255,0.4);
}

/* RESULT */
.result {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
  display: none;
}

.result.show {
  display: block;
  animation: pop 0.5s ease;
}

@keyframes pop {
  from { opacity:0; transform:scale(0.9); }
  to { opacity:1; transform:scale(1); }
}

/* SAFE / HATE */
.safe { background: rgba(0,229,160,0.1); border:1px solid rgba(0,229,160,0.3); }
.hate { background: rgba(255,77,112,0.1); border:1px solid rgba(255,77,112,0.3); }

/* BAR */
.bar {
  height: 6px;
  background: #1a1a25;
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0;
  transition: 1s ease;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

/* LOADING */
.loading {
  margin-top: 15px;
  display: none;
  font-size: 14px;
  color: var(--muted);
}

.loading.show {
  display: block;
}

</style>
</head>

<body>

<div class="container">

<h1>PunjabiGuard AI</h1>

<div class="card">

<textarea id="text" placeholder="Type Punjabi text here..."></textarea>

<button onclick="analyze()">Analyze</button>

<div class="loading" id="loading">Analyzing...</div>

<div class="result" id="result">
  <h3 id="label"></h3>
  <p id="desc"></p>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <p id="confidence"></p>
</div>

</div>
</div>

<script>

const API = "https://devxaman-punjabi-hate-detector.hf.space";

/* REAL-TIME AI FEEL */
let timer;
document.getElementById("text").addEventListener("input", () => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    if (text.value.length > 5) analyze();
  }, 800);
});

/* ANALYZE */
async function analyze() {
  const text = document.getElementById("text").value.trim();
  if (!text) return;

  loading.classList.add("show");
  result.classList.remove("show");

  try {
    const res = await fetch(API + "/predict", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({text})
    });

    const data = await res.json();
    showResult(data);

  } catch (e) {
    alert("Server error. Try again.");
  }

  loading.classList.remove("show");
}

/* SHOW RESULT */
function showResult(data) {

  const isHate = data.is_hate;
  const conf = data.confidence;

  result.className = "result show " + (isHate ? "hate":"safe");

  label.innerText = isHate ? "🚨 HATE DETECTED" : "✅ SAFE TEXT";

  desc.innerText = isHate
    ? "Toxic or harmful language detected."
    : "This text is safe.";

  confidence.innerText = "Confidence: " + (conf*100).toFixed(1) + "%";

  setTimeout(() => {
    fill.style.width = (conf*100) + "%";
  },100);
}

</script>

</body>
</html>
