<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PunjabiGuard AI</title>

  <!-- Clerk (official way for static sites) -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_YXBwYXJlbnQtY2l2ZXQtMjMuY2xlcmsuYWNjb3VudHMuZGV2JA"  <!-- 🔴 REPLACE THIS -->
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+Gurmukhi&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0a0a12;
      --card:#12121a;
      --text:#fff;
      --muted:#9aa0b5;
      --accent:#7c6bff;
      --border: rgba(255,255,255,0.06);
    }
    body.light {
      --bg:#f4f5fb;
      --card:#ffffff;
      --text:#111;
      --muted:#6b7280;
      --border: rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family:'Outfit', sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, rgba(124,107,255,0.12), transparent 60%),
                  radial-gradient(800px 500px at 120% 120%, rgba(255,107,138,0.08), transparent 60%),
                  var(--bg);
      color:var(--text);
      height:100vh;
      display:flex;
    }

    /* Auth */
    #auth {
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* App layout */
    #app {
      display:none;
      width:100%;
      height:100vh;
    }
    .sidebar {
      width:260px;
      background:var(--card);
      border-right:1px solid var(--border);
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .logo {
      font-weight:800;
      letter-spacing:0.3px;
      font-size:18px;
    }
    .tagline {
      font-size:12px;
      color:var(--muted);
      margin-top:-6px;
    }
    .userBox {
      margin-top:8px;
      padding:10px 12px;
      border-radius:10px;
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      font-size:13px;
    }
    .btn {
      margin-top:6px;
      padding:10px 12px;
      border-radius:10px;
      border:none;
      background:linear-gradient(120deg, var(--accent), #9a8bff);
      color:#fff;
      cursor:pointer;
    }
    .ghost {
      background:transparent;
      color:var(--muted);
      border:1px solid var(--border);
    }
    .toggle {
      margin-top:auto;
      font-size:13px;
      color:var(--muted);
      cursor:pointer;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }
    .topbar {
      height:56px;
      display:flex;
      align-items:center;
      padding:0 16px;
      border-bottom:1px solid var(--border);
      background:var(--card);
      gap:10px;
    }
    .badge {
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      color:var(--muted);
    }

    .chat {
      flex:1;
      overflow:auto;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .msg {
      max-width:70%;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.5;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.02);
    }
    .user-msg {
      margin-left:auto;
      background:#2c2c45;
      border-color:transparent;
    }
    .bot-msg {
      background:#161628;
    }

    .input-area {
      display:flex;
      gap:10px;
      padding:12px;
      border-top:1px solid var(--border);
      background:var(--card);
    }
    input {
      flex:1;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#141425;
      color:#fff;
      font-family:'Noto Sans Gurmukhi',sans-serif;
    }
    body.light input {
      background:#f3f4f6;
      color:#111;
    }
    button.send {
      padding:12px 16px;
      border-radius:12px;
      border:none;
      background:linear-gradient(120deg, var(--accent), #9a8bff);
      color:#fff;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <!-- AUTH MOUNT -->
  <div id="auth"></div>

  <!-- APP -->
  <div id="app">
    <div class="sidebar">
      <div>
        <div class="logo">🤖 PunjabiGuard AI</div>
        <div class="tagline">MuRIL • Punjabi Hate Detection</div>
      </div>

      <div id="userBox" class="userBox"></div>

      <button class="btn" onclick="signOut()">Logout</button>
      <button class="btn ghost" onclick="clearChat()">Clear chat</button>

      <div class="toggle" onclick="toggleTheme()">🌗 Toggle theme</div>
    </div>

    <div class="main">
      <div class="topbar">
        <div class="badge">API: HF Space</div>
        <div class="badge">Mode: Realtime</div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="input-area">
        <input id="input" placeholder="Type Punjabi (Gurmukhi) or English text..." />
        <button class="send" onclick="send()">Send</button>
      </div>
    </div>
  </div>

<script>
/* ========= CONFIG ========= */
const API = "https://devxaman-punjabi-hate-detector.hf.space";

/* ========= CLERK BOOTSTRAP ========= */
// Wait until Clerk script is ready (no race conditions)
function waitForClerk() {
  return new Promise((resolve) => {
    if (window.Clerk) return resolve(window.Clerk);
    const t = setInterval(() => {
      if (window.Clerk) {
        clearInterval(t);
        resolve(window.Clerk);
      }
    }, 50);
  });
}

async function init() {
  const Clerk = await waitForClerk();

  try {
    await Clerk.load(); // publishable key comes from <script data-...>
  } catch (e) {
    console.error("Clerk load failed:", e);
    document.getElementById("auth").innerHTML =
      "<p style='color:#ff6b8a'>Auth failed to load. Check your Clerk key.</p>";
    return;
  }

  if (Clerk.user) {
    showApp(Clerk);
  } else {
    // Mount sign-in (Google button will appear if enabled in dashboard)
    Clerk.mountSignIn(document.getElementById("auth"), {
      appearance: { variables: { colorPrimary: "#7c6bff" } }
    });
  }

  Clerk.addListener(() => {
    if (Clerk.user) showApp(Clerk);
  });
}

init();

/* ========= APP ========= */
function showApp(Clerk) {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "flex";

  const user = Clerk.user;
  const name = user?.firstName || user?.username || user?.primaryEmailAddress?.emailAddress || "User";

  document.getElementById("userBox").innerHTML =
    `👤 ${name}<br><span style="color:#9aa0b5;font-size:12px;">Signed in</span>`;
}

function signOut() {
  if (window.Clerk) window.Clerk.signOut();
}

function toggleTheme() {
  document.body.classList.toggle("light");
}

/* ========= CHAT ========= */
function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  const chat = document.getElementById("chat");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function clearChat() {
  document.getElementById("chat").innerHTML = "";
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user-msg");
  input.value = "";

  const bot = addMessage("Analyzing…", "bot-msg");

  try {
    const res = await fetch(API + "/predict", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.message || "Request failed");
    }

    const data = await res.json();
    const label = data.is_hate ? "🚨 Hate detected" : "✅ Safe text";
    const conf = (data.confidence * 100).toFixed(1) + "%";

    bot.textContent = `${label} • Confidence: ${conf}`;
  } catch (e) {
    bot.textContent = "Server error. Try again.";
  }
}
</script>

</body>
</html>
