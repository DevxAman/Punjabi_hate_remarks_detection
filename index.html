<script>
const API = "https://devxaman-punjabi-hate-detector.hf.space";

function waitClerk() {
  return new Promise(resolve => {
    if (window.Clerk) return resolve(window.Clerk);
    let t = setInterval(() => {
      if (window.Clerk) {
        clearInterval(t);
        resolve(window.Clerk);
      }
    }, 50);
  });
}

async function init() {
  const Clerk = window.Clerk;

  if (!Clerk) {
    console.error("Clerk not loaded");
    return;
  }

  await Clerk.load();

  if (Clerk.user) {
    showApp();
  } else {
    Clerk.mountSignIn(document.getElementById("auth"));
  }

  Clerk.addListener(() => {
    if (Clerk.user) showApp();
  });
}

init();
</script>
