<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PunjabiGuard AI - Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Gurmukhi&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Outfit',sans-serif;
  background:#0a0a12;
  color:#fff;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#11111a;
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.05);
}

.stat {
  margin:20px 0;
}

.stat h2 {
  margin:0;
  font-size:1.6rem;
  color:#7c6bff;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* CHAT */
.chat {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.msg {
  margin-bottom:15px;
  max-width:70%;
  padding:12px 15px;
  border-radius:14px;
}

.user { background:#2a2a40; margin-left:auto; }
.bot { background:#17172a; }

/* INPUT */
.input {
  display:flex;
  padding:15px;
  border-top:1px solid rgba(255,255,255,0.05);
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#151525;
  color:white;
}

button {
  margin-left:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#7c6bff;
  color:white;
  cursor:pointer;
}

/* HIGHLIGHT */
.toxic {
  color:#ff4d70;
  font-weight:600;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>PunjabiGuard AI</h2>

  <div class="stat">
    <p>Total Checks</p>
    <h2 id="count">0</h2>
  </div>

  <div class="stat">
    <p>Hate Detected</p>
    <h2 id="hateCount">0</h2>
  </div>
</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="input">
  <input id="input" placeholder="Type Punjabi text...">
  <button onclick="send()">Send</button>
</div>

</div>

<script>

const API = "https://devxaman-punjabi-hate-detector.hf.space";

let total = 0;
let hate = 0;

/* SEND MESSAGE */
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  total++;
  updateStats();

  const typing = addMessage("Analyzing...","bot");

  try {
    const res = await fetch(API+"/predict",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text})
    });

    const data = await res.json();

    /* STREAM EFFECT */
    let msg = data.is_hate
      ? "🚨 Hate detected."
      : "✅ Safe text.";

    typing.innerHTML = "";
    streamText(typing,msg);

    if(data.is_hate) hate++;
    updateStats();

  } catch(e){
    typing.innerText="Error contacting server.";
  }
}

/* STREAM TEXT */
function streamText(el,text){
  let i=0;
  let interval=setInterval(()=>{
    el.innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },20);
}

/* ADD MESSAGE */
function addMessage(text,type){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className="msg "+type;

  if(type==="user"){
    div.innerText=text;
  } else {
    div.innerHTML=highlight(text);
  }

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

/* HIGHLIGHT TOXIC WORDS */
function highlight(text){
  const words=["ਮੂਰਖ","ਕਮੀਨਾ","ਗੰਦਾ"];
  words.forEach(w=>{
    text=text.replaceAll(w, `<span class="toxic">${w}</span>`);
  });
  return text;
}

/* STATS */
function updateStats(){
  document.getElementById("count").innerText=total;
  document.getElementById("hateCount").innerText=hate;
}

</script>

</body>
</html>
